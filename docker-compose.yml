# ==================================
# 💡 DOCKER MODES:
# ==================================
# A. FULL DOCKER (Production/Testing):
#    Jalankan: docker compose up -d --build
#    Akses: http://localhost:3010
#
# B. HYBRID MODE (Development):
#    Hanya jalankan DB & ML di Docker:
#    Jalankan: npm run docker:services
#    Lalu jalankan aplikasi di luar: npm run dev
# ==================================

services:
  # ==================================
  # Database PostgreSQL
  # ==================================
  postgres_db:
    image: postgres:16-alpine
    container_name: erp_pangan_db_v2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: erp_pangan_masa_depan
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================================
  # Backend API (Node.js + TypeScript)
  # ==================================
  naiv:
    build: .
    container_name: erp_pangan_api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-erp_pangan_masa_depan}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key}
      ML_SERVICE_URL: http://ml-service:8000
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres123}@postgres_db:5432/${DB_NAME:-erp_pangan_masa_depan}?schema=public
      SEED_SECRET: ${SEED_SECRET:-P4ng4nM4s4D3p4nJ4y4!}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    restart: always

  # ==================================
  # ML Service (Python + FastAPI)
  # ==================================
  ml-service:
    build: ./ml-service
    container_name: erp_pangan_ml
    ports:
      - "8000:8000"
    restart: always

  # ==================================
  # Frontend (React + Nginx)
  # ==================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: erp_pangan_frontend
    ports:
      - "3010:80"
    depends_on:
      - naiv
    restart: always

volumes:
  postgres_data:

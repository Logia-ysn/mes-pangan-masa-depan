# ==================================
# Docker Compose - ERP Pangan Masa Depan
# ==================================
#
# CARA PAKAI:
# 1. Install Docker Desktop: https://docker.com/products/docker-desktop
# 2. Buka terminal di folder ini
# 3. Jalankan: docker-compose up -d
# 4. Buka browser: http://localhost
#
# PERINTAH BERGUNA:
# - Lihat status: docker-compose ps
# - Lihat logs: docker-compose logs -f
# - Stop semua: docker-compose down
# - Rebuild: docker-compose up -d --build
#
# ==================================

services:
  # ==================================
  # Database PostgreSQL
  # ==================================
  db:
    image: postgres:16-alpine
    container_name: erp_pangan_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: erp_pangan_masa_depan
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================================
  # Backend API (Node.js + TypeScript)
  # ==================================
  naiv:
    build: .
    container_name: erp_pangan_api
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-erp_pangan_masa_depan}
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key}
      ML_SERVICE_URL: http://ml-service:8000
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres123}@db:5432/${DB_NAME:-erp_pangan_masa_depan}?schema=public
      SEED_SECRET: ${SEED_SECRET:-P4ng4nM4s4D3p4nJ4y4!}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    restart: always

  # ==================================
  # ML Service (Python + FastAPI)
  # ==================================
  ml-service:
    build: ./ml-service
    container_name: erp_pangan_ml
    ports:
      - "8000:8000"
    restart: always

  # ==================================
  # Frontend (React + Nginx)
  # ==================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: erp_pangan_frontend
    ports:
      - "8080:80"
    depends_on:
      - naiv
    restart: always

volumes:
  postgres_data:
